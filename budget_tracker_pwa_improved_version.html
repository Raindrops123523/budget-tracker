<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget Tracker</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 400px;
      margin: auto;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      font-weight: bold;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      display: flex;
      justify-content: space-between;
      background: #fff;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
    }

    .actions button {
      margin-left: 5px;
      padding: 5px;
      font-size: 12px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>💰 Budget Tracker</h2>

  <div class="card">
    <input type="number" id="amount" placeholder="Amount">
    <select id="category">
      <option value="Food">Food</option>
      <option value="Transport">Transport</option>
      <option value="Bills">Bills</option>
      <option value="Others">Others</option>
    </select>
    <button onclick="addExpense()">Add Expense</button>
  </div>

  <div class="card">
    <h3>Total: ₱<span id="total">0</span></h3>
    <ul id="list"></ul>
  </div>
</div>

<script>
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];
let editIndex = -1;

function saveData() {
  localStorage.setItem("expenses", JSON.stringify(expenses));
}

function addExpense() {
  let amount = document.getElementById("amount").value;
  let category = document.getElementById("category").value;

  if (!amount) return;

  if (editIndex === -1) {
    expenses.push({ amount: Number(amount), category });
  } else {
    expenses[editIndex] = { amount: Number(amount), category };
    editIndex = -1;
  }

  document.getElementById("amount").value = "";
  saveData();
  displayExpenses();
}

function deleteExpense(index) {
  expenses.splice(index, 1);
  saveData();
  displayExpenses();
}

function editExpense(index) {
  document.getElementById("amount").value = expenses[index].amount;
  document.getElementById("category").value = expenses[index].category;
  editIndex = index;
}

function displayExpenses() {
  let list = document.getElementById("list");
  let total = 0;
  list.innerHTML = "";

  expenses.forEach((e, index) => {
    total += e.amount;

    let li = document.createElement("li");

    li.innerHTML = `
      <span>${e.category} - ₱${e.amount}</span>
      <div class="actions">
        <button onclick="editExpense(${index})">Edit</button>
        <button onclick="deleteExpense(${index})">Delete</button>
      </div>
    `;

    list.appendChild(li);
  });

  document.getElementById("total").textContent = total;
}

// Simple Service Worker for offline
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

displayExpenses();
</script>

</body>
</html>
